version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: food_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: foodapp
      POSTGRES_PASSWORD: foodapp123
      POSTGRES_DB: food_delivery
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foodapp -d food_delivery"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: food_backend
    restart: unless-stopped
    environment:
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: foodapp
      DB_PASSWORD: foodapp123
      DB_NAME: food_delivery
      JWT_SECRET: supersecretjwtkey2024fooddash
      NODE_ENV: production
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: food_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:

networks:
  default:
    name: food_network
